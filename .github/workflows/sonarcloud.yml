name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud needs full history for accurate analysis

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install SonarCloud scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Install coverage tool
        run: dotnet tool install --global dotnet-coverage
            
      - name: Pre-generate JasperFx static code
        run: dotnet run --project src/AutomaticEnvelopes.Api/AutomaticEnvelopes.Api.csproj -- codegen write

      - name: Begin SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin \
            /k:"TU_NUEVO_PROJECT_KEY_AQUI" \
            /o:"TU_NUEVA_ORGANIZATION_KEY_AQUI" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml \
            /d:sonar.terraform.provider.aws.version="6.0"

      - name: Build
        run: dotnet build AutomaticEnvelopes.slnx --no-incremental

      - name: Run tests with coverage
        run: |
          dotnet-coverage collect \
            "dotnet test AutomaticEnvelopes.slnx --no-build" \
            -f xml -o coverage.xml

      - name: End SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet-sonarscanner end /d:sonar.token="${SONAR_TOKEN}"
