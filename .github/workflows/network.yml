name: "CI/CD: Network Infrastructure"

on:
  push:
    branches: [ 'main' ]
    paths:
      - 'infra/network/**'
      - '.github/workflows/network.yml'
      - '.github/workflows/reusable-terraform.yml'
  workflow_dispatch:

jobs:
  deploy-dev:
    name: "Development"
    uses: ./.github/workflows/reusable-terraform.yml
    permissions:
      id-token: write
      contents: read
    with:
      env_name: development
      tf_folder: dev
      working_dir: infra/network
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  deploy-prod:
    name: "Production"
    needs: deploy-dev
    uses: ./.github/workflows/reusable-terraform.yml
    permissions:
      id-token: write
      contents: read
    with:
      env_name: production
      tf_folder: prod
      working_dir: infra/network
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}