name: "CI/CD: Database Infrastructure"
on:
  push:
    branches:
      - main
    paths:
      - 'infra/db/**'
      - '.github/workflows/db.yml'
      - '.github/workflows/reusable-terraform.yml'
  workflow_dispatch:

jobs:
  deploy-dev:
    uses: ./.github/workflows/reusable-terraform.yml
    with:
      env_name: development
      tf_folder: dev
      working_dir: infra/db
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  deploy-prod:
    needs: deploy-dev
    uses: ./.github/workflows/reusable-terraform.yml
    with:
      env_name: production
      tf_folder: prod
      working_dir: infra/db
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}