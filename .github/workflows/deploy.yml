name: "CI/CD: API & Serverless"
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Dockerfile'
      - 'infra/serverless/**'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/reusable-serverless.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: "Build & Run Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore src/AutomaticEnvelopes.Api/AutomaticEnvelopes.Api.csproj
      - run: dotnet build src/AutomaticEnvelopes.Api/AutomaticEnvelopes.Api.csproj --no-restore --configuration Release
      - run: dotnet test tests/AutomaticEnvelopes.Tests/AutomaticEnvelopes.Tests.csproj --no-build --configuration Release
  
  deploy-dev:
    needs: build-and-test
    uses: ./.github/workflows/reusable-serverless.yml
    permissions:
      id-token: write
      contents: read
    with:
      env_name: development
      tf_folder: dev
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  deploy-prod:
    needs: deploy-dev
    uses: ./.github/workflows/reusable-serverless.yml
    permissions:
      id-token: write
      contents: read
    with:
      env_name: production
      tf_folder: prod
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}