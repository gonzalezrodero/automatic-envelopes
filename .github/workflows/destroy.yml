name: "CI/CD: Infrastructure Destruction"
on:
  workflow_dispatch:
    inputs:
      env_name:
        description: 'Env'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - production
      target_folder:
        description: 'Folder'
        required: true
        default: 'infra/serverless'
        type: choice
        options:
          - infra/serverless
          - infra/db
          - infra/network
      confirmation:
        description: 'Type "yes"'
        required: true
        default: 'no'

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify
        env:
          CONF: ${{ inputs.confirmation }}
        run: |
          [ "$CONF" == "yes" ] || exit 1
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1
      - uses: hashicorp/setup-terraform@v3
      - name: Set Folder
        id: env
        run: |
          echo "folder=$([ "${{ inputs.env_name }}" == "production" ] && echo "prod" || echo "dev")" >> $GITHUB_OUTPUT
      - name: Terraform Init
        run: terraform init -backend-config="config/${{ steps.env.outputs.folder }}/config.remote"
        working-directory: ${{ inputs.target_folder }}
      - name: Terraform Destroy
        run: terraform destroy -var-file="config/${{ steps.env.outputs.folder }}/config.tfvars" -var="image_tag=destroy" -auto-approve
        working-directory: ${{ inputs.target_folder }}