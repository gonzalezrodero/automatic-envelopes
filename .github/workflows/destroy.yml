name: "CI/CD: Infrastructure Destruction"

on:
  workflow_dispatch:
    inputs:
      env_name:
        description: 'Environment to DESTROY'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - production
      target_folder:
        description: 'Terraform folder to DESTROY'
        required: true
        default: 'infra/serverless'
        type: choice
        options:
          - infra/serverless
          - infra/db
          - infra/network
      confirmation:
        description: 'Type "yes" to confirm destruction'
        required: true
        default: 'no'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1

jobs:
  destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    environment: ${{ inputs.env_name }} 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Confirmation
        env:
          CONFIRM_INPUT: ${{ inputs.confirmation }}
        run: |
          if [ "$CONFIRM_INPUT" != "yes" ]; then
            echo "Destruction aborted. Confirmation was not 'yes'."
            exit 1
          fi

      - name: Set Terraform Folder Name
        id: tf-env
        env:
          ENV_NAME: ${{ inputs.env_name }}
        run: |
          if [ "$ENV_NAME" == "production" ]; then
            echo "folder=prod" >> $GITHUB_OUTPUT
          else
            echo "folder=dev" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} 
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        env:
          TF_FOLDER: ${{ steps.tf-env.outputs.folder }}
        run: terraform init -backend-config="config/$TF_FOLDER/config.remote"
        working-directory: ${{ inputs.target_folder }}

      - name: Terraform Destroy
        env:
          TF_FOLDER: ${{ steps.tf-env.outputs.folder }}
        run: |
          terraform destroy \
            -var-file="config/$TF_FOLDER/config.tfvars" \
            -var="image_tag=destroy-dummy" \
            -auto-approve \
            -no-color
        working-directory: ${{ inputs.target_folder }}