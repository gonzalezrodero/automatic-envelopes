name: "CI/CD: Bootstrap Infrastructure"
on:
  push: 
    branches:
      - main
    paths: 
      - 'infra/bootstrap/**'
      - '.github/workflows/bootstrap.yml'
      - '.github/workflows/reusable-terraform.yml'
  workflow_dispatch:

jobs:
  deploy-dev:
    name: "Development"
    uses: ./.github/workflows/reusable-terraform.yml
    with: 
      env_name: development
      tf_folder: dev
      working_dir: infra/bootstrap
    secrets: 
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  deploy-prod:
    name: "Production"
    needs: deploy-dev
    uses: ./.github/workflows/reusable-terraform.yml
    with: 
      env_name: production
      tf_folder: prod
      working_dir: infra/bootstrap
    secrets: 
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}